name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create .env for build
        run: |
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> .env

      - name: Pull images
        run: docker compose pull

      - name: Build and start full stack
        run: docker compose up --build -d

      - name: Wait for API to be healthy
        run: |
          for i in {1..60}; do
            if curl -sf http://localhost:8000/health; then
              echo "API is up"
              exit 0
            fi
            echo "Waiting for API... ($i)"
            sleep 5
          done
          echo "API did not become healthy in time"
          docker compose ps
          docker compose logs
          exit 1

      - name: Run migrations
        run: docker compose exec -T api alembic upgrade head

      - name: Verify tables exist
        run: docker compose exec -T postgres psql -U pathmeet_user -d pathmeet -c "\dt"

      - name: Tear down
        if: always()
        run: docker compose down -v

  push-image:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pathmeet-backend:latest
            ghcr.io/${{ github.repository_owner }}/pathmeet-backend:${{ github.sha }}